<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette BPJEPS APT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;min-height:100vh;padding:1rem}
.app{max-width:600px;margin:0 auto}
.header{background:#fff;border-radius:16px;border:1px solid #e0ddd6;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-size:17px;font-weight:600;color:#1a1a1a}
.header-sub{font-size:13px;color:#888;margin-top:2px}
.fiche-num{font-size:11px;color:#aaa;font-weight:500}
.spin-btn{width:100%;padding:15px;font-size:17px;font-weight:600;border-radius:14px;border:none;background:#534AB7;color:#fff;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.01em;margin-bottom:14px}
.spin-btn:hover{opacity:.9}
.spin-btn:active{transform:scale(0.98)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{border-radius:12px;padding:13px 15px;min-height:76px;border:1px solid transparent}
.card-activite{background:#EEEDFE;border-color:#c5c1f0}
.card-jeu{background:#E1F5EE;border-color:#7dd9b8}
.card-materiel{background:#FAEEDA;border-color:#f0c070}
.card-age{background:#FBEAF0;border-color:#f0a8c8}
.card-surface{background:#EAF3DE;border-color:#a8d870}
.card-effectif{background:#FAECE7;border-color:#f0a888}
.card-duree{background:#E6F1FB;border-color:#90c8f0}
.card-meteo{background:#FFF8E1;border-color:#FFD54F}
.card-interieur{background:#F1EFE8;border-color:#c8c5b8}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600}
.card-activite .card-label{color:#3C3489}
.card-jeu .card-label{color:#085041}
.card-materiel .card-label{color:#633806}
.card-age .card-label{color:#72243E}
.card-surface .card-label{color:#27500A}
.card-effectif .card-label{color:#712B13}
.card-duree .card-label{color:#0C447C}
.card-meteo .card-label{color:#854F0B}
.card-interieur .card-label{color:#444441}
.card-value{font-size:15px;font-weight:600;line-height:1.3}
.card-activite .card-value{color:#26215C}
.card-jeu .card-value{color:#04342C}
.card-materiel .card-value{color:#412402}
.card-age .card-value{color:#4B1528}
.card-surface .card-value{color:#173404}
.card-effectif .card-value{color:#4A1B0C}
.card-duree .card-value{color:#042C53}
.card-meteo .card-value{color:#412402}
.card-interieur .card-value{color:#2C2C2A}
.card-sub{font-size:12px;margin-top:3px;opacity:.75}
.card-activite .card-sub{color:#3C3489}
.card-jeu .card-sub{color:#085041}
.card-materiel .card-sub{color:#633806}
.card-age .card-sub{color:#72243E}
.card-surface .card-sub{color:#27500A}
.card-effectif .card-sub{color:#712B13}
.card-duree .card-sub{color:#0C447C}
.card-meteo .card-sub{color:#633806}
.card-interieur .card-sub{color:#5F5E5A}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);color:#412402}
.meteo-row{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.saison-badge{font-size:11px;padding:2px 10px;border-radius:20px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.1);color:#633806}
.empty-state{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px;background:#fff;border-radius:14px;border:1px solid #e0ddd6}
.full{grid-column:span 2}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="header-title">Roulette BPJEPS APT</div>
      <div class="header-sub">Tirage de situation d'évaluation</div>
    </div>
    <div class="fiche-num" id="fiche-num">—</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="lancerTirage()">Lancer le tirage</button>

  <div id="result-area">
    <div class="empty-state">Appuie sur le bouton pour générer un scénario complet</div>
  </div>

</div>

<script>
var DATA = {
  activites:[
    {nom:"Rugby",emoji:"🏉",materiel_principal:"Ballon de rugby"},
    {nom:"Yoga",emoji:"🧘",materiel_principal:"Tapis de yoga"},
    {nom:"Parcours training",emoji:"🏋️",materiel_principal:"Plots + ateliers de parcours"},
    {nom:"Football",emoji:"⚽",materiel_principal:"Ballon de football"},
    {nom:"Handball",emoji:"🤾",materiel_principal:"Ballon de handball"},
    {nom:"Basketball",emoji:"🏀",materiel_principal:"Ballon de basket"},
    {nom:"Boxe éducative",emoji:"🥊",materiel_principal:"Gants de boxe + protège-dents"},
    {nom:"Danse",emoji:"💃",materiel_principal:"Enceinte + espace dégagé"}
  ],
  jeux:[
    "Le ballon capitaine","Le ramasse foulards","Le béret",
    "Poules renard vipères","Le drapeau","La passe à 5",
    "L'horloge","L'épervier","Les gendarmes et les voleurs",
    "Minuit dans la bergerie"
  ],
  materiel:[
    ["Plots","Cerceaux","Cordes","Dossards","Cônes"],
    ["Plots","Dossards","Cerceaux","Ballons mousse"],
    ["Cordes","Plots","Cônes","Lattes"],
    ["Cerceaux","Dossards","Plots","Élastiques","Marqueurs au sol"],
    ["Plots","Cônes","Dossards","Chronomètre"]
  ],
  ages:[
    {label:"Petite section",detail:"Maternelle – 3 ans",besoins:"Imitation, découverte du mouvement, sécurité affective"},
    {label:"Moyenne section",detail:"Maternelle – 4 ans",besoins:"Jeu symbolique, coopération simple, repères spatiaux"},
    {label:"Grande section",detail:"Maternelle – 5 ans",besoins:"Règles simples, équilibre, motricité globale"},
    {label:"CP",detail:"6 ans",besoins:"Entrée dans les règles, coopération, réussite rapide"},
    {label:"CE1",detail:"7 ans",besoins:"Stratégie simple, esprit d'équipe, diversité des rôles"},
    {label:"CE2",detail:"8 ans",besoins:"Compétition encadrée, autonomie croissante, fair-play"},
    {label:"CM1",detail:"9 ans",besoins:"Tactique collective, responsabilisation, arbitrage"},
    {label:"CM2",detail:"10 – 11 ans",besoins:"Leadership, complexité des règles, gestion de l'effort"}
  ],
  surfaces:[
    {nom:"Pelouse naturelle",lieu:"Extérieur",exterieur:true},
    {nom:"Gazon synthétique",lieu:"Extérieur",exterieur:true},
    {nom:"Bitume / asphalte",lieu:"Extérieur",exterieur:true},
    {nom:"Herbe",lieu:"Extérieur",exterieur:true},
    {nom:"Parquet",lieu:"Gymnase",exterieur:false},
    {nom:"Carrelage",lieu:"Salle polyvalente",exterieur:false},
    {nom:"Tatami",lieu:"Dojo / salle",exterieur:false}
  ],
  meteo:[
    {icone:"☀️",condition:"Ensoleillé",vent:"Vent faible",saison:"Été",temp_min:24,temp_max:32},
    {icone:"⛅",condition:"Nuageux",vent:"Vent modéré",saison:"Printemps",temp_min:14,temp_max:19},
    {icone:"🌥️",condition:"Couvert",vent:"Vent fort",saison:"Automne",temp_min:8,temp_max:13},
    {icone:"🌦️",condition:"Averses",vent:"Vent modéré",saison:"Automne",temp_min:10,temp_max:15},
    {icone:"🌧️",condition:"Pluie",vent:"Vent fort",saison:"Hiver",temp_min:4,temp_max:8},
    {icone:"🌬️",condition:"Ensoleillé",vent:"Vent fort",saison:"Printemps",temp_min:11,temp_max:17},
    {icone:"❄️",condition:"Froid sec",vent:"Vent faible",saison:"Hiver",temp_min:0,temp_max:5},
    {icone:"🌤️",condition:"Beau temps",vent:"Sans vent",saison:"Été",temp_min:20,temp_max:27}
  ],
  durees:["30 min","45 min","60 min","1h30","2h"],
  effectifs:[
    {nb:"6 – 8",type:"Petit groupe"},
    {nb:"10 – 15",type:"Groupe moyen"},
    {nb:"16 – 20",type:"Grand groupe"},
    {nb:"20 – 30",type:"Classe entière"}
  ]
};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function randTemp(min,max){return Math.round(min+Math.random()*(max-min));}

var currentFiche=null, counter=0, spinning=false;

function buildFiche(){
  var surface=pick(DATA.surfaces);
  var meteoBase=pick(DATA.meteo);
  return{
    activite:pick(DATA.activites),
    jeu:pick(DATA.jeux),
    materiel:pick(DATA.materiel),
    age:pick(DATA.ages),
    surface:surface,
    meteo:{icone:meteoBase.icone,condition:meteoBase.condition,vent:meteoBase.vent,saison:meteoBase.saison,temp:randTemp(meteoBase.temp_min,meteoBase.temp_max)},
    duree:pick(DATA.durees),
    effectif:pick(DATA.effectifs)
  };
}

function renderCards(fiche){
  var meteoHtml;
  if(fiche.surface.exterieur){
    var m=fiche.meteo;
    meteoHtml='<div class="card card-meteo full">'
      +'<div class="card-label">Météo prévision</div>'
      +'<div class="meteo-row">'
      +'<span style="font-size:24px">'+m.icone+'</span>'
      +'<span style="font-size:22px;font-weight:700;color:#412402">'+m.temp+'°C</span>'
      +'<span class="saison-badge">'+m.saison+'</span>'
      +'<span class="saison-badge">'+m.condition+'</span>'
      +'<span class="saison-badge">'+m.vent+'</span>'
      +'</div></div>';
  } else {
    meteoHtml='<div class="card card-interieur full">'
      +'<div class="card-label">Lieu</div>'
      +'<div class="card-value">Activité en intérieur</div>'
      +'<div class="card-sub">Météo non applicable — espace couvert</div>'
      +'</div>';
  }

  return '<div class="result-grid">'
    +'<div class="card card-activite">'
    +'<div class="card-label">Activité support</div>'
    +'<div class="card-value">'+fiche.activite.emoji+' '+fiche.activite.nom+'</div>'
    +'<div class="card-sub">'+fiche.activite.materiel_principal+'</div></div>'

    +'<div class="card card-jeu">'
    +'<div class="card-label">Jeu de l'enfance</div>'
    +'<div class="card-value">'+fiche.jeu+'</div></div>'

    +'<div class="card card-materiel">'
    +'<div class="card-label">Matériel disponible</div>'
    +'<div class="badge-row">'+fiche.materiel.map(function(m){return'<span class="badge">'+m+'</span>';}).join('')+'</div></div>'

    +'<div class="card card-age">'
    +'<div class="card-label">Catégorie d'âge</div>'
    +'<div class="card-value">'+fiche.age.label+'</div>'
    +'<div class="card-sub">'+fiche.age.detail+' — '+fiche.age.besoins+'</div></div>'

    +'<div class="card card-surface">'
    +'<div class="card-label">Surface &amp; lieu</div>'
    +'<div class="card-value">'+fiche.surface.nom+'</div>'
    +'<div class="card-sub">'+fiche.surface.lieu+'</div></div>'

    +'<div class="card card-effectif">'
    +'<div class="card-label">Effectif</div>'
    +'<div class="card-value">'+fiche.effectif.nb+' élèves</div>'
    +'<div class="card-sub">'+fiche.effectif.type+'</div></div>'

    +meteoHtml

    +'<div class="card card-duree full">'
    +'<div class="card-label">Durée de séance</div>'
    +'<div class="card-value" style="font-size:24px">'+fiche.duree+'</div></div>'

    +'</div>';
}

function lancerTirage(){
  if(spinning) return;
  spinning=true;
  var btn=document.getElementById("spinBtn");
  btn.disabled=true;
  btn.textContent="Tirage en cours...";

  var ticks=0;
  var timer=setInterval(function(){
    ticks++;
    document.getElementById("result-area").innerHTML=renderCards(buildFiche());
    if(ticks>=16){
      clearInterval(timer);
      var final=buildFiche();
      currentFiche=final;
      counter++;
      document.getElementById("result-area").innerHTML=renderCards(final);
      document.getElementById("fiche-num").textContent="Fiche #"+counter;
      btn.disabled=false;
      btn.textContent="Nouveau tirage";
      spinning=false;
    }
  },100);
}
</script>
</body>
</html>
